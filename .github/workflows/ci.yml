name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo test

      - run: cargo clippy -- -D warnings

      - run: cargo fmt -- --check
