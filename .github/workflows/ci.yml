name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install TypeScript and @mysten/sui for TS compilation tests
      - name: Install ts-check dependencies
        run: cd tests/ts-check && pnpm install --frozen-lockfile

      - run: cargo test

      - run: cargo clippy -- -D warnings

      - run: cargo fmt -- --check
